name: CI/CD Pipeline Task Manager

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3

    - name: Login su Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build e Push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: buggenzo/task-frontend:latest

    - name: Build e Push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: buggenzo/task-backend:latest

    - name: Deploy su Kubernetes (Master Node)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.AWS_MASTER_IP }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          # Riavvio pod per download immagini
          kubectl rollout restart deployment backend-deploy
          kubectl rollout restart deployment frontend-deploy