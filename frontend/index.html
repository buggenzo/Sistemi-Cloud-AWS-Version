<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #eaeded;
            padding-bottom: 15px;
        }
        .input-group {
            display: flex;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccd1d1;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            padding: 12px;
            background-color: #fcfcfc;
            border: 1px solid #f0f3f4;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background-color: #e74c3c;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 14px;
        }
        .delete-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Task Manager</h1>
    
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Aggiungi una nuova attività...">
        <button onclick="addTask()">Aggiungi</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>

    const API_URL = '/api/tasks';

    async function fetchTasks() {
        try {
            const response = await fetch(API_URL);
            const tasks = await response.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${task.title}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Elimina</button>
                `;
                list.appendChild(li);
            });
        } catch (error) {
            console.error('Errore nel recupero dei task:', error);
        }
    }

    async function addTask() {
        const input = document.getElementById('taskInput');
        const title = input.value.trim();
        if (!title) return;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title })
            });
            if (response.ok) {
                input.value = '';
                fetchTasks();
            }
        } catch (error) {
            console.error('Errore nel salvataggio del task:', error);
        }
    }

    async function deleteTask(id) {
        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });
            if (response.ok) {
                fetchTasks();
            }
        } catch (error) {
            console.error('Errore nell\'eliminazione del task:', error);
        }
    }

    // Carica task all'avvio della pagina
    fetchTasks();
</script>

</body>

</html>
